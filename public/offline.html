<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline – Basketball Training</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 48px 32px;
      max-width: 360px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
    }
    .emoji { font-size: 64px; margin-bottom: 16px; }
    h1 { color: #1565C0; font-size: 1.5rem; margin-bottom: 12px; }
    p { color: #666; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">🏀</div>
    <h1>You're offline</h1>
    <p>Please check your connection and try again.</p>
  </div>
</body>
</html>
